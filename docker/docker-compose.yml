version: '3.8'

services:
  fitness-admin:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: fitness-admin
    ports:
      - "8080:8080"
    env_file:
      - ../deploy/fitness-admin.env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DB=fitness
      - MYSQL_USER=root
      - MYSQL_PASSWORD=fitness123
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
    depends_on:
      - mysql
      - redis
    networks:
      - fitness-network
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: fitness-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=fitness123
      - MYSQL_DATABASE=fitness
      - MYSQL_CHARACTER_SET_SERVER=utf8mb4
      - MYSQL_COLLATION_SERVER=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - fitness-network
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: fitness-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - fitness-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: fitness-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - fitness-admin
    networks:
      - fitness-network
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:

networks:
  fitness-network:
    driver: bridge
