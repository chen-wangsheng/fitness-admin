server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/fitness?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
  data:
    redis:
      host: localhost
      port: 6379

wx:
  miniapp:
    appid: ${WX_APPID}
    secret: ${WX_SECRET}
    token: ${WX_TOKEN:}
    aes-key: ${WX_AES_KEY:}

logging:
  level:
    com.fitness.admin: debug
    com.baomidou.mybatisplus: debug
