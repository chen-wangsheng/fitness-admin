server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DB}?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

wx:
  miniapp:
    appid: ${WX_APPID}
    secret: ${WX_SECRET}
    token: ${WX_TOKEN:}
    aes-key: ${WX_AES_KEY:}

logging:
  level:
    root: warn
    com.fitness.admin: info
    org.springframework.web: warn
  file:
    name: /var/log/fitness-admin/app.log
