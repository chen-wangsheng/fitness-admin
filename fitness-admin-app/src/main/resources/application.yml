server:
  port: 8080

spring:
  application:
    name: fitness-admin
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:fitness}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.fitness.admin.**.entity
  type-handlers-package: com.baomidou.mybatisplus.extension.handlers
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

sa-token:
  token-name: Authorization
  timeout: 7200
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: true
  token-prefix: Bearer

knife4j:
  enable: true
  openapi:
    title: 运动健身助手管理后台API
    description: 运动健身助手管理后台后端服务接口文档
    version: v1.0.0
    contact:
      name: Fitness Admin
    servers:
      - url: http://localhost:8080
        description: 本地环境

logging:
  level:
    com.fitness.admin: debug
    org.springframework.security: debug

cos:
  secret-id: ${COS_SECRET_ID:}
  secret-key: ${COS_SECRET_KEY:}
  region: ${COS_REGION:}
  bucket: ${COS_BUCKET:}
  url-prefix: ${COS_URL_PREFIX:}

ai:
  provider: ${AI_PROVIDER:openai}
  api-key: ${AI_API_KEY:}
  api-base-url: ${AI_API_BASE_URL:https://api.openai.com/v1}
  model: ${AI_MODEL:gpt-3.5-turbo}
  max-tokens: ${AI_MAX_TOKENS:2000}
  temperature: ${AI_TEMPERATURE:0.7}
